<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sheraton Seating System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
  <div class="container">
    <img src="images/logo.png" alt="Sheraton" class="logo">
    <h1>Sheraton Seating System</h1>
    <p class="subtitle">Znajdź swoje miejsce przy stoliku</p>
  </div>
</header>

<main class="container">

<section class="search-section">
  <div class="search-box">
    <input
      type="text"
      id="searchInput"
      placeholder="Wpisz imię lub nazwisko..."
      autocomplete="off">
  </div>
</section>

<section id="messageBox" class="message hidden">
</section>

<section id="results" class="results">
</section>

</main>

<div id="planModal" class="modal hidden">

  <div class="modal-content">

    <button id="closeModal" class="closeButton">&times;</button>

    <h2 id="hallTitle">
      Plan sali
    </h2>

    <div class="planWrapper">

      <img
        src="images/plan.png"
        id="hallPlan"
        alt="Plan sali">

      <div id="tableMarker"></div>

    </div>

  </div>

</div>

<footer>

  <div class="container">

    <p>
      © Sheraton Seating System
    </p>

  </div>

</footer>

<script src="script.js"></script>

</body>
</html>
