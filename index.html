<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sheraton Seating System</title>
<meta name="theme-color" content="#b08d57">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
  <div class="container">
    <div class="brand">
      <div class="brand-line"></div>
      <h1>Sheraton Seating System</h1>
      <div class="brand-line"></div>
    </div>

    <p class="subtitle">
      Wyszukaj swoje miejsce przy stoliku podczas wydarzenia
    </p>

    <div class="search-panel">
      <label for="searchInput" class="visually-hidden">
        Wyszukiwarka
      </label>

      <input
        id="searchInput"
        type="search"
        autocomplete="off"
        placeholder="🔍 Wpisz imię lub nazwisko...">

      <small>
        Możesz wpisać fragment imienia lub nazwiska.
      </small>
    </div>
  </div>
</header>

<main class="container">

  <section id="messageBox" class="message hidden"></section>

  <section id="results" class="results"></section>

</main>

<div id="planModal" class="modal hidden">

  <div class="modal-content">

    <button
      id="closeModal"
      class="closeButton"
      aria-label="Zamknij">
      ×
    </button>

    <h2 id="hallTitle">
      Plan sali
    </h2>

    <div class="planWrapper">

      <img
        id="hallPlan"
        src="images/plan.png"
        alt="Plan sali">

      <div id="tableMarker"></div>

    </div>

  </div>

</div>

<footer>
  <div class="container">
    <p>Sheraton Seating System • Wersja 0.3</p>
  </div>
</footer>

<script src="script.js"></script>

</body>
</html>
